<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon (origen: public/logo.png) -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />

    <meta property="og:locale" content="es_MX" />
    <meta property="og:url" content="https://wefe.vercel.app/" />
    <meta
      property="og:title"
      content="W.E.F.E — Agencia de desarrollo web a medida en LATAM"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="W.E.F.E — Agencia de desarrollo web a medida en LATAM"
    />
    <meta
      name="twitter:description"
      content="Construimos sistemas, apps móviles y e-commerce a medida. Equipo pequeño, atención directa, sin intermediarios."

    <meta name="twitter:image" content="https://wefe.vercel.app/logo.png" />

        "name": "W.E.F.E",
        "alternateName": "Wireless Everywhere For Everyone",
        "url": "https://wefe.vercel.app/",
        "logo": "https://wefe.vercel.app/logo.png",
        "image": "https://wefe.vercel.app/logo.png",

          { "@type": "Place", "name": "México" },
          { "@type": "Place", "name": "Latinoamérica" }

        "serviceType": [
